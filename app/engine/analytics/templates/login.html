<!DOCTYPE html>
<html lang="en" style="font-size: 18px;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } } }</script>
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <p class="text-xl font-bold text-gray-900">HumTech</p>
      <p class="text-xs uppercase tracking-widest text-gray-400 mt-1">Analytics Command Centre</p>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-8">
      <h1 class="text-lg font-semibold text-gray-900 mb-6">Sign in</h1>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-6">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/analytics/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required autofocus
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-gray-900 focus:border-transparent">
        </div>
        <button type="submit"
                class="w-full px-4 py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">
          Sign in
        </button>
      </form>
    </div>
  </div>

</body>
</html>
