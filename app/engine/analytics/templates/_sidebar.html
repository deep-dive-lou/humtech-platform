{% macro sidebar(active='') %}
{% set bc = '#1e3a5f' %}
<aside class="fixed left-0 top-0 h-screen w-60 bg-white border-r border-gray-200 z-20 flex flex-col">

  <!-- Brand -->
  <div class="px-5 pt-6 pb-4">
    <p class="text-base font-bold tracking-wide text-gray-900">HumTech</p>
    <p class="text-xs uppercase tracking-widest text-gray-400 mt-1">Analytics</p>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 px-3 mt-2 space-y-1">
    <a href="/analytics/"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if active == 'dashboard' %}font-semibold{% else %}text-gray-500 hover:text-gray-900 hover:bg-gray-50{% endif %}"
       {% if active == 'dashboard' %}style="background-color: {{ bc }}12; color: {{ bc }}"{% endif %}>
      <i data-lucide="layout-dashboard" class="w-5 h-5 flex-shrink-0"></i>
      Dashboard
    </a>

    <a href="/analytics/control-charts"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if active == 'control_charts' %}font-semibold{% else %}text-gray-500 hover:text-gray-900 hover:bg-gray-50{% endif %}"
       {% if active == 'control_charts' %}style="background-color: {{ bc }}12; color: {{ bc }}"{% endif %}>
      <i data-lucide="activity" class="w-5 h-5 flex-shrink-0"></i>
      Control Charts
    </a>

    <a href="/analytics/survival"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if active == 'survival' %}font-semibold{% else %}text-gray-500 hover:text-gray-900 hover:bg-gray-50{% endif %}"
       {% if active == 'survival' %}style="background-color: {{ bc }}12; color: {{ bc }}"{% endif %}>
      <i data-lucide="clock" class="w-5 h-5 flex-shrink-0"></i>
      Survival Analysis
    </a>

    <a href="/analytics/bottleneck"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if active == 'bottleneck' %}font-semibold{% else %}text-gray-500 hover:text-gray-900 hover:bg-gray-50{% endif %}"
       {% if active == 'bottleneck' %}style="background-color: {{ bc }}12; color: {{ bc }}"{% endif %}>
      <i data-lucide="filter" class="w-5 h-5 flex-shrink-0"></i>
      Bottleneck
    </a>

    <!-- Causal section -->
    <div class="border-t border-gray-100 my-3 mx-0"></div>
    <p class="px-3 text-[10px] uppercase tracking-widest text-gray-400 mb-1">Causal</p>

    <a href="/analytics/causal"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if active == 'causal' %}font-semibold{% else %}text-gray-500 hover:text-gray-900 hover:bg-gray-50{% endif %}"
       {% if active == 'causal' %}style="background-color: {{ bc }}12; color: {{ bc }}"{% endif %}>
      <i data-lucide="git-branch" class="w-5 h-5 flex-shrink-0"></i>
      Causal Attribution
    </a>

    <a href="/analytics/cohort"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if active == 'cohort' %}font-semibold{% else %}text-gray-500 hover:text-gray-900 hover:bg-gray-50{% endif %}"
       {% if active == 'cohort' %}style="background-color: {{ bc }}12; color: {{ bc }}"{% endif %}>
      <i data-lucide="grid-3x3" class="w-5 h-5 flex-shrink-0"></i>
      Cohort Analysis
    </a>
  </nav>

  <!-- Footer -->
  <div class="px-4 py-4 border-t border-gray-100">
    <a href="/analytics/logout" class="block text-xs text-gray-400 hover:text-gray-900 transition-colors">Sign out</a>
  </div>

</aside>
{% endmacro %}
