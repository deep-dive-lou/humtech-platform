<!DOCTYPE html>
<html lang="en" style="font-size: 18px;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Analytics{% endblock %} — HumTech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } } }</script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen">

  <div class="flex min-h-screen">
    {% from "_sidebar.html" import sidebar %}
    {{ sidebar(active=active_page) }}

    <main class="flex-1 ml-60">
      <div class="px-10 py-8">
        {% if error %}
        <div class="bg-amber-50 border border-amber-200 text-amber-800 text-sm rounded-lg px-4 py-3 mb-6">
          {{ error }}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script>lucide.createIcons();</script>
  {% block scripts %}{% endblock %}
</body>
</html>
