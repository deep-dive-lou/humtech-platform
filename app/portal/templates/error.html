<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or 'Something went wrong' }} — HumTech Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } } }</script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center">

  <div class="text-center px-6 max-w-md">
    <p class="text-6xl font-bold text-gray-200 mb-4">{{ status_code or 500 }}</p>
    <h1 class="text-xl font-semibold text-gray-900 mb-2">{{ title or 'Something went wrong' }}</h1>
    <p class="text-base text-gray-500 mb-8">{{ message or "We hit an unexpected error. The team has been notified and we're looking into it." }}</p>
    <div class="flex items-center justify-center gap-3">
      <a href="/portal/staff/" class="btn-brand text-base font-medium px-5 py-2.5 rounded-xl transition-colors inline-block" style="background-color: #111827; color: #fff;">
        Go to dashboard
      </a>
      <button onclick="history.back()" class="text-base text-gray-500 hover:text-gray-900">
        Go back
      </button>
    </div>
  </div>

</body>
</html>
