{% macro sidebar(staff, active='', brand=None) %}
{% set bc = '#111827' %}
<aside class="fixed left-0 top-0 h-screen w-60 bg-white border-r border-gray-200 z-20 flex flex-col">

  <!-- Brand -->
  <div class="px-5 pt-6 pb-4">
    <p class="text-base font-bold tracking-wide text-gray-900">HumTech</p>
    <p class="text-xs uppercase tracking-widest text-gray-400 mt-1">Optimisation Engine</p>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 px-3 mt-2 space-y-1">
    <a href="/optimiser/"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-base font-medium transition-colors
              {% if active == 'experiments' %}font-semibold{% else %}text-gray-500 hover:text-gray-900 hover:bg-gray-50{% endif %}"
       {% if active == 'experiments' %}style="background-color: {{ bc }}12; color: {{ bc }}"{% endif %}>
      <i data-lucide="flask-conical" class="w-5 h-5 flex-shrink-0"></i>
      Experiments
    </a>
  </nav>

  <!-- User block -->
  <div class="px-4 py-4 border-t border-gray-100">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold text-white flex-shrink-0"
           style="background-color: {{ bc }}">
        {{ (staff.full_name or staff.email or '?')[0] | upper }}
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-medium text-gray-900 truncate">{{ staff.full_name or staff.email }}</p>
        <p class="text-[11px] uppercase text-gray-400">{{ staff.role }}</p>
      </div>
    </div>
    <a href="/optimiser/logout" class="block mt-3 text-xs text-gray-400 hover:text-gray-900 transition-colors">Sign out</a>
  </div>

</aside>
{% endmacro %}
